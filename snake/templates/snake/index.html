<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - Django</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .score-item {
            font-size: 1.2em;
            color: #333;
        }

        .score-value {
            font-weight: bold;
            color: #667eea;
            font-size: 1.5em;
        }

        canvas {
            border: 4px solid #667eea;
            border-radius: 10px;
            background: #222;
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            color: #666;
            font-size: 0.9em;
        }

        .instructions kbd {
            background: #e0e0e0;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .game-over h2 {
            color: #e74c3c;
            font-size: 2em;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 Snake Game</h1>
        
        <div class="score-board">
            <div class="score-item">Score: <span id="score" class="score-value">0</span></div>
            <div class="score-item">High Score: <span id="high-score" class="score-value">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button class="btn-primary" onclick="startGame()">Start Game</button>
            <button class="btn-secondary" onclick="resetGame()">Reset</button>
        </div>

        <div class="instructions">
            Use <kbd>Arrow Keys</kbd> or <kbd>WASD</kbd> to control the snake<br>
            Eat the red food to grow and score points!<br>
            Don't hit the walls or yourself!
        </div>

        <div id="gameOver" class="game-over">
            <h2>Game Over!</h2>
            <p>Your Score: <span id="final-score">0</span></p>
            <button class="btn-primary" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isGameRunning = false;
        
        document.getElementById('high-score').textContent = highScore;

        function initSnake() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            while (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (subtle)
            ctx.strokeStyle = '#333';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#4ade80';
                } else {
                    const alpha = 1 - (index / snake.length) * 0.5;
                    ctx.fillStyle = `rgba(74, 222, 128, ${alpha})`;
                }
                
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();

                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    const eyeSize = 4;
                    const eyeOffset = 5;
                    
                    if (direction.x !== 0) {
                        ctx.beginPath();
                        ctx.arc(
                            segment.x * gridSize + (direction.x > 0 ? 14 : 6),
                            segment.y * gridSize + 6,
                            eyeSize, 0, Math.PI * 2
                        );
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(
                            segment.x * gridSize + (direction.x > 0 ? 14 : 6),
                            segment.y * gridSize + 14,
                            eyeSize, 0, Math.PI * 2
                        );
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(
                            segment.x * gridSize + 6,
                            segment.y * gridSize + (direction.y > 0 ? 14 : 6),
                            eyeSize, 0, Math.PI * 2
                        );
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(
                            segment.x * gridSize + 14,
                            segment.y * gridSize + (direction.y > 0 ? 14 : 6),
                            eyeSize, 0, Math.PI * 2
                        );
                        ctx.fill();
                    }
                }
            });

            // Draw food
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // Food glow effect
            ctx.fillStyle = 'rgba(239, 68, 68, 0.3)';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 + 4,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function update() {
            direction = { ...nextDirection };

            const head = { 
                x: snake[0].x + direction.x, 
                y: snake[0].y + direction.y 
            };

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
                
                // Speed up slightly
                if (gameLoop) {
                    clearInterval(gameLoop);
                    const speed = Math.max(80, 150 - Math.floor(score / 30) * 10);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        function startGame() {
            if (isGameRunning) return;
            
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            
            initSnake();
            spawnFood();
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            
            isGameRunning = true;
            draw();
            
            const speed = 150;
            gameLoop = setInterval(update, speed);
        }

        function resetGame() {
            if (gameLoop) clearInterval(gameLoop);
            isGameRunning = false;
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            
            initSnake();
            spawnFood();
            draw();
        }

        function gameOver() {
            clearInterval(gameLoop);
            isGameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('high-score').textContent = highScore;
            }
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function handleKeydown(e) {
            if (!isGameRunning && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd'].includes(e.key)) {
                startGame();
                return;
            }

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }

            e.preventDefault();
        }

        document.addEventListener('keydown', handleKeydown);

        // Initial draw
        initSnake();
        spawnFood();
        draw();
    </script>
</body>
</html>
